\* Phase 2 target model: 3 providers, max 2 shrinks.
\* ShrinkPreventsEarlyExhaustion SHOULD hold (no premature exhaustion).
\* ShrinkBounded SHOULD hold (no infinite shrink loop).
SPECIFICATION SpecWithShrink
CONSTANTS
    NumProviders = 3
    AcceptOnExhaustion = TRUE
    MaxShrinks = 2
INVARIANT TypeOK
INVARIANT ShrinkPreventsEarlyExhaustion
INVARIANT ShrinkBounded
CHECK_DEADLOCK FALSE
