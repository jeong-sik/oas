name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (OCaml ${{ matrix.ocaml-compiler }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        ocaml-compiler: ['5.1.x', '5.4.x']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true

      - name: Pin fork packages
        run: |
          SDK_REF=793c793ede90114d834c8b5f2e9115c21add8d2f
          # bisect_ppx fork only needed for 5.4.x (coverage); skip on 5.1.x
          # to avoid dependency resolution failures
          if [ "${{ matrix.ocaml-compiler }}" = "5.4.x" ]; then
            opam pin add bisect_ppx git+https://github.com/patricoferris/bisect_ppx.git#5.2 --no-action --yes
          fi
          opam pin add mcp_protocol git+https://github.com/jeong-sik/mcp-protocol-sdk.git#${SDK_REF} --no-action --yes

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only --with-test --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build
        run: opam exec -- dune build @all

      - name: Harness replay eval
        run: |
          opam exec -- dune exec ./bin/oas_cli.exe -- \
            eval run \
            --dataset examples/evals/replay.jsonl \
            --out _build/evals

      - name: Test
        env:
          ALCOTEST_QUICK_TESTS: "1"
        run: opam exec -- dune runtest

      - name: Upload harness eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-eval-${{ matrix.ocaml-compiler }}
          path: _build/evals
          if-no-files-found: warn

      - name: Coverage report
        if: matrix.ocaml-compiler == '5.4.x'
        env:
          BISECT_ENABLE: "yes"
        run: |
          opam exec -- dune clean
          opam exec -- dune runtest --force
          COVERAGE=$(opam exec -- bisect-ppx-report summary 2>/dev/null | grep -oP '\d+\.\d+(?=%)' | head -1 || echo "0")
          echo "Total coverage: ${COVERAGE}%"
          opam exec -- bisect-ppx-report summary --per-file || true
          # Enforce minimum coverage threshold (80%)
          if [ -n "$COVERAGE" ]; then
            THRESHOLD=80
            if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
              echo "Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
              exit 1
            fi
            echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"
          fi

      - name: Build documentation (odoc)
        if: matrix.ocaml-compiler == '5.4.x'
        run: |
          opam install odoc --yes
          opam exec -- dune build @doc

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x
          dune-cache: true

      - name: Pin fork packages
        run: |
          SDK_REF=793c793ede90114d834c8b5f2e9115c21add8d2f
          opam pin add bisect_ppx git+https://github.com/patricoferris/bisect_ppx.git#5.2 --no-action --yes
          opam pin add mcp_protocol git+https://github.com/jeong-sik/mcp-protocol-sdk.git#${SDK_REF} --no-action --yes

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only --with-test --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Check warnings as errors
        run: opam exec -- dune build @install --force
        env:
          OCAMLPARAM: "_,warn-error=+a"

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version strings match
        run: |
          DUNE_VER=$(grep '(version' dune-project | head -1 | sed 's/.*version \(.*\))/\1/')
          echo "dune-project version: $DUNE_VER"

          SDK_VER=$(grep 'let version' lib/sdk_version.ml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "sdk_version.ml version: $SDK_VER"

          if [ "$DUNE_VER" != "$SDK_VER" ]; then
            echo "ERROR: dune-project ($DUNE_VER) != agent_sdk.ml ($SDK_VER)"
            exit 1
          fi

          echo "Version consistency check passed: $DUNE_VER"
