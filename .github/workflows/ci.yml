name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (OCaml ${{ matrix.ocaml-compiler }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        ocaml-compiler: ['5.4.1']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true

      - name: Pin fork packages
        run: |
          source scripts/mcp-sdk-pin.sh
          opam pin add bisect_ppx git+https://github.com/patricoferris/bisect_ppx.git#5.2 --no-action --yes
          opam pin add mcp_protocol "git+${MCP_SDK_URL}#${MCP_SDK_SHA}" --no-action --yes

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only --with-test --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build
        run: opam exec -- dune build @all

      - name: Harness replay eval
        run: |
          opam exec -- dune exec ./bin/oas_cli.exe -- \
            eval run \
            --dataset examples/evals/replay.jsonl \
            --out _build/evals

      - name: Test
        env:
          ALCOTEST_QUICK_TESTS: "1"
        run: opam exec -- dune runtest

      - name: Upload harness eval artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: harness-eval-${{ matrix.ocaml-compiler }}
          path: _build/evals
          if-no-files-found: warn

      - name: Coverage report
        if: matrix.ocaml-compiler == '5.4.1'
        env:
          BISECT_ENABLE: "yes"
          # Force Eio's posix/epoll backend so bisect-instrumented tests do
          # not initialise io_uring rings. GitHub-hosted runners cap
          # RLIMIT_MEMLOCK at 8 MiB for unprivileged users and
          # `ulimit -l unlimited` is silently denied, so each extra
          # io_uring_queue_init under bisect eventually returns ENOMEM and
          # fails the step.
          EIO_BACKEND: "posix"
        run: |
          opam exec -- dune clean
          # --instrument-with bisect_ppx activates the `(instrumentation
          # (backend bisect_ppx))` stanza declared in lib/dune. Without
          # this flag dune ignores the stanza, no .coverage files are
          # written, and `bisect-ppx-report summary` exits "no *.coverage
          # files found" — which the old `2>/dev/null | head -1 || echo 0`
          # pipeline silently masked as an empty coverage value, bypassing
          # the 80% threshold check below.
          opam exec -- dune runtest --force --instrument-with bisect_ppx

          SUMMARY=$(opam exec -- bisect-ppx-report summary 2>&1 || true)
          echo "$SUMMARY"

          COVERAGE=$(echo "$SUMMARY" | grep -oP '\d+\.\d+(?=%)' | head -1 || true)
          if [ -z "$COVERAGE" ]; then
            echo "::error::Coverage summary parse failed — no '<number>%' found in bisect-ppx-report output."
            exit 1
          fi

          echo "Total coverage: ${COVERAGE}%"
          opam exec -- bisect-ppx-report summary --per-file || true

          THRESHOLD=80
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

      - name: Build documentation (odoc)
        if: matrix.ocaml-compiler == '5.4.1'
        run: |
          opam install odoc --yes
          opam exec -- dune build @doc

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.1
          dune-cache: true

      - name: Pin fork packages
        run: |
          source scripts/mcp-sdk-pin.sh
          opam pin add bisect_ppx git+https://github.com/patricoferris/bisect_ppx.git#5.2 --no-action --yes
          opam pin add mcp_protocol "git+${MCP_SDK_URL}#${MCP_SDK_SHA}" --no-action --yes

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only --with-test --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Check warnings as errors
        run: opam exec -- dune build @install --force
        env:
          OCAMLPARAM: "_,warn-error=+a"

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify version strings match
        run: |
          DUNE_VER=$(grep '(version' dune-project | head -1 | sed 's/.*version \(.*\))/\1/')
          echo "dune-project version: $DUNE_VER"

          SDK_VER=$(grep 'let version' lib/sdk_version.ml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "sdk_version.ml version: $SDK_VER"

          if [ "$DUNE_VER" != "$SDK_VER" ]; then
            echo "ERROR: dune-project ($DUNE_VER) != agent_sdk.ml ($SDK_VER)"
            exit 1
          fi

          echo "Version consistency check passed: $DUNE_VER"

  transport-drift:
    name: Transport Drift Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run transport drift gate
        run: bash scripts/check-transport-truth.sh

  sdk-independence:
    name: SDK Independence Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run SDK independence gate
        run: bash scripts/check-sdk-independence.sh

  tag-drift:
    name: Release Tag Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Enforced gate: fails if any CHANGELOG entry in the default scope
    # (--limit 10) lacks a matching `v<version>` git tag. The backlog
    # surfaced when #1130 landed (v0.155.1, v0.160.0, v0.161.0,
    # v0.163.0, v0.164.0) was back-tagged in the same session, so the
    # default scope is drift-free. Widening --limit further surfaces a
    # deeper backlog (duplicate `[0.154.0]`, out-of-order `[0.155.0]`)
    # that needs CHANGELOG cleanup before the scope is raised.

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need full tag history for `git tag -l` to see released versions.
          fetch-depth: 0

      - name: Enforce tag drift (strict)
        run: bash scripts/check-tag-drift.sh --strict
