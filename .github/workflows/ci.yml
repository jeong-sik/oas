name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (OCaml ${{ matrix.ocaml-compiler }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        ocaml-compiler: ['5.1.x', '5.4.x']
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-cache: true

      - name: Pin fork packages
        run: |
          # bisect_ppx fork only needed for 5.4.x (coverage); skip on 5.1.x
          # to avoid dependency resolution failures
          if [ "${{ matrix.ocaml-compiler }}" = "5.4.x" ]; then
            opam pin add bisect_ppx git+https://github.com/patricoferris/bisect_ppx.git#5.2 --no-action --yes
          fi
          opam pin add mcp_protocol git+https://github.com/jeong-sik/mcp-protocol-sdk.git#main --no-action --yes
          opam pin add mcp_protocol_eio git+https://github.com/jeong-sik/mcp-protocol-sdk.git#main --no-action --yes

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only --with-test --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build
        run: opam exec -- dune build @all

      - name: Test
        env:
          ALCOTEST_QUICK_TESTS: "1"
        run: opam exec -- dune runtest

      - name: Coverage report
        if: matrix.ocaml-compiler == '5.4.x'
        continue-on-error: true
        env:
          BISECT_ENABLE: "yes"
        run: |
          opam exec -- dune clean
          opam exec -- dune runtest --force
          opam exec -- bisect-ppx-report summary || echo "Coverage files not found; skipping report"
          opam exec -- bisect-ppx-report summary --per-file || true

      - name: Build documentation (odoc)
        if: matrix.ocaml-compiler == '5.4.x'
        run: opam exec -- dune build @doc

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x
          dune-cache: true

      - name: Pin fork packages
        run: |
          opam pin add bisect_ppx git+https://github.com/patricoferris/bisect_ppx.git#5.2 --no-action --yes
          opam pin add mcp_protocol git+https://github.com/jeong-sik/mcp-protocol-sdk.git#main --no-action --yes
          opam pin add mcp_protocol_eio git+https://github.com/jeong-sik/mcp-protocol-sdk.git#main --no-action --yes

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only --with-test --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Check warnings as errors
        run: opam exec -- dune build @install --force
        env:
          OCAMLPARAM: "_,warn-error=+a"

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version strings match
        run: |
          DUNE_VER=$(grep '(version' dune-project | head -1 | sed 's/.*version \(.*\))/\1/')
          echo "dune-project version: $DUNE_VER"

          SDK_VER=$(grep 'let version' lib/agent_sdk.ml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "agent_sdk.ml version: $SDK_VER"

          if [ "$DUNE_VER" != "$SDK_VER" ]; then
            echo "ERROR: dune-project ($DUNE_VER) != agent_sdk.ml ($SDK_VER)"
            exit 1
          fi

          echo "Version consistency check passed: $DUNE_VER"
