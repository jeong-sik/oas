name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x
          dune-cache: true

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only --with-test --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Build
        run: opam exec -- dune build

      - name: Test
        env:
          ALCOTEST_QUICK_TESTS: "1"
        run: opam exec -- dune test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.x
          dune-cache: true

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            opam install . --deps-only --with-test --yes && break
            if [ "$attempt" -eq 3 ]; then
              echo "opam install failed after ${attempt} attempts"
              exit 1
            fi
            echo "opam install failed (attempt ${attempt}); retrying in 15s..."
            sleep 15
          done

      - name: Check warnings as errors
        run: opam exec -- dune build @install --force
        env:
          OCAMLPARAM: "_,warn-error=+a"
